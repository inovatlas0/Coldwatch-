<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ColdWatch Audit Interactive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: white; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .gradient-text { background: linear-gradient(90deg, #38bdf8, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="max-w-2xl w-full">
        <div class="mb-8 text-center">
            <h1 class="text-4xl font-bold gradient-text">ColdWatch Franchise</h1>
            <p class="text-slate-400 mt-2">Audit de conformité et de sécurité thermique v2.0</p>
        </div>

        <div class="glass rounded-3xl p-8 shadow-2xl">
            <div id="step-content">
                <div class="flex items-center gap-4 mb-6">
                    <span class="bg-blue-500/20 text-blue-400 px-3 py-1 rounded-full text-xs font-bold uppercase tracking-wider">Étape 1/3</span>
                    <h2 class="text-2xl font-semibold">Identité du Site</h2>
                </div>

                <div class="space-y-6">
                    <div>
                        <label class="block text-sm font-medium text-slate-400 mb-2">Nom du Restaurant</label>
                        <input type="text" placeholder="ex: Burger King - Paris 15" class="w-full bg-slate-800/50 border border-slate-700 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all">
                    </div>
                    
                    <div class="grid grid-cols-2 gap-4">
                        <button class="flex flex-col items-center justify-center gap-3 p-6 rounded-2xl border-2 border-slate-700 hover:border-blue-500 hover:bg-blue-500/5 transition-all group">
                            <span class="text-3xl group-hover:scale-110 transition-transform">❄️</span>
                            <span class="font-medium">Froid Positif</span>
                        </button>
                        <button class="flex flex-col items-center justify-center gap-3 p-6 rounded-2xl border-2 border-slate-700 hover:border-blue-500 hover:bg-blue-500/5 transition-all group">
                            <span class="text-3xl group-hover:scale-110 transition-transform">🧊</span>
                            <span class="font-medium">Froid Négatif</span>
                        </button>
                    </div>
                </div>
            </div>

            <div class="mt-10 flex justify-between items-center">
                <button class="text-slate-400 hover:text-white transition-colors">Passer</button>
                <button class="bg-blue-600 hover:bg-blue-500 text-white px-8 py-3 rounded-xl font-bold shadow-lg shadow-blue-500/20 transition-all transform hover:-translate-y-1">
                    Continuer →
                </button>
            </div>
        </div>

        <div class="mt-6 flex gap-4">
            <div class="glass flex-1 p-4 rounded-2xl text-center">
                <p class="text-xs text-slate-400 uppercase tracking-tighter">Risque Évalué</p>
                <p class="text-xl font-bold text-green-400">Faible</p>
            </div>
            <div class="glass flex-1 p-4 rounded-2xl text-center">
                <p class="text-xs text-slate-400 uppercase tracking-tighter">Gain Temps Reléves</p>
                <p class="text-xl font-bold text-blue-400">+15h <span class="text-sm font-normal">/mois</span></p>
            </div>
        </div>
    </div>

</body>
</html>
